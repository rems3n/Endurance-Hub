<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>EnduroAI | Landing Page Tests</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#f7f9fb] text-[#2a3439] min-h-screen flex items-center justify-center">
  <div class="max-w-md mx-auto px-6 text-center space-y-8">
    <div class="space-y-3">
      <h1 class="text-3xl font-bold tracking-tight">EnduroAI</h1>
      <p class="text-sm text-[#566166]">Landing page A/B test variants</p>
    </div>
    <div class="space-y-4">
      <a href="interest-test/" class="block bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow text-left">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="font-bold text-lg">Interest Test</h2>
            <p class="text-sm text-[#566166] mt-1">Soft CTAs: "Join Waitlist", "Get Early Access", "Get Started"</p>
            <p class="text-xs text-[#545f73] mt-2 font-semibold">Tests: Is there interest in this product?</p>
          </div>
          <span class="text-[#545f73]">&rarr;</span>
        </div>
      </a>
      <a href="sign-up-test/" class="block bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow text-left">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="font-bold text-lg">Sign-Up Test</h2>
            <p class="text-sm text-[#566166] mt-1">Hard CTAs: "Sign Up" everywhere</p>
            <p class="text-xs text-[#545f73] mt-2 font-semibold">Tests: Will people commit to buying?</p>
          </div>
          <span class="text-[#545f73]">&rarr;</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
